name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      # Full test suite. Includes the regression gates that stand in for a
      # production docusaurus build (which needs the consumer repo + content and
      # can't run here):
      #   - mdx-safety: no string/bare `style=` attributes (the construct that
      #     has broken SSG before) across the convert → post-process pipeline.
      #   - links: internal link/anchor resolution + slug stability.
      #   - converter golden fixtures.
      - name: Test
        run: npm test
